{% extends "layout.html" %}
{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">

  <p class="text-xs font-semibold tracking-[0.2em] uppercase text-brand-purple mb-4">404 — Not Found</p>
  <h1 class="text-5xl sm:text-7xl font-black tracking-tighter text-white mb-4">Page Not Found</h1>
  <p class="text-gray-500 max-w-sm text-sm leading-relaxed mb-10">
    The page you're looking for doesn't exist, may have been moved, or the
    link might be broken.
  </p>

  <a href="{{ url_for('main.home') }}"
     class="px-6 py-2.5 rounded-xl bg-brand-purple text-white text-sm font-semibold
            shadow-lg shadow-brand-purple/20 hover:bg-violet-500 transition-colors">
    Back to Home
  </a>
</div>
{% endblock %}
