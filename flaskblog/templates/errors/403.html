{% extends "layout.html" %}
{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">

  <p class="text-xs font-semibold tracking-[0.2em] uppercase text-brand-purple mb-4">403 — Forbidden</p>
  <h1 class="text-5xl sm:text-7xl font-black tracking-tighter text-white mb-4">Access Denied</h1>
  <p class="text-gray-500 max-w-sm text-sm leading-relaxed mb-10">
    You don't have permission to view this page. If you believe this is a mistake,
    please sign in with the correct account.
  </p>

  <div class="flex flex-col sm:flex-row gap-3">
    <a href="{{ url_for('main.home') }}"
       class="px-6 py-2.5 rounded-xl bg-brand-purple text-white text-sm font-semibold
              shadow-lg shadow-brand-purple/20 hover:bg-violet-500 transition-colors">
      Go Home
    </a>
    <a href="{{ url_for('users.login') }}"
       class="px-6 py-2.5 rounded-xl text-sm font-semibold text-gray-400
              bg-white/5 border border-white/10 hover:text-white hover:bg-white/10 transition-all">
      Sign In
    </a>
  </div>
</div>
{% endblock %}
